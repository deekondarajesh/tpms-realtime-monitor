name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Build & run unit tests (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pure-logic unit tests
        run: make test

  firmware-build:
    name: Cross-compile STM32 firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GCC toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build firmware
        run: make firmware

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpms_monitor-firmware
          path: |
            build/tpms_monitor.elf
            build/tpms_monitor.bin
